<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="1024"><stop stop-color="#090B12"/><stop offset=".52" stop-color="#101521"/><stop offset="1" stop-color="#05070B"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#171E2F" stop-opacity=".94"/><stop offset="1" stop-color="#0B101B" stop-opacity=".9"/></linearGradient>
    <style>
      .title{font:800 36px Inter,Arial,sans-serif;fill:#F8FAFC}.h2{font:700 18px Inter,Arial,sans-serif;fill:#F8FAFC}.body{font:500 14px Inter,Arial,sans-serif;fill:#CBD5E1}.muted{font:500 13px Inter,Arial,sans-serif;fill:#64748B}.tiny{font:700 11px Inter,Arial,sans-serif;fill:#94A3B8}.card{fill:url(#panel);stroke:#263347}.line{stroke:#263347}
    </style>
  </defs>
  <rect width="1440" height="1024" fill="url(#bg)"/>
  <rect x="32" y="28" width="1376" height="82" rx="18" fill="#0B111D" stroke="#1E293B"/>
  <text x="64" y="78" class="title">Live Interview</text>
  <rect x="962" y="50" width="150" height="36" rx="18" fill="#052E2B" stroke="#115E59"/><circle cx="984" cy="68" r="6" fill="#2DD4BF"/><text x="1000" y="73" class="tiny">Teams active</text>
  <rect x="1128" y="50" width="122" height="36" rx="18" fill="#2B173F" stroke="#6D28D9"/><text x="1150" y="73" class="tiny">Invisible ON</text>
  <rect x="1266" y="50" width="108" height="36" rx="8" fill="#EF4444"/><text x="1294" y="73" style="font:800 12px Inter,Arial;fill:white">Stop</text>
  <rect x="32" y="140" width="360" height="836" rx="16" class="card"/>
  <text x="64" y="184" class="h2">Meeting information</text>
  <rect x="64" y="216" width="296" height="74" rx="12" fill="#111827" stroke="#334155"/><text x="88" y="250" class="tiny">ACTIVE WINDOW</text><text x="88" y="274" class="body">Microsoft Teams - Hiring Loop</text>
  <rect x="64" y="314" width="296" height="74" rx="12" fill="#111827" stroke="#334155"/><text x="88" y="348" class="tiny">CAPTURE SOURCE</text><text x="88" y="372" class="body">Screen 1, 2560 x 1440</text>
  <text x="64" y="446" class="h2">Transcript</text>
  <g>
    <rect x="64" y="480" width="296" height="92" rx="12" fill="#0F172A"/><text x="84" y="512" class="tiny">INTERVIEWER</text><text x="84" y="540" class="body">Can you explain the tradeoffs in your cache design?</text>
    <rect x="64" y="596" width="296" height="112" rx="12" fill="#111827"/><text x="84" y="628" class="tiny">YOU</text><text x="84" y="656" class="body">I would start with consistency, invalidation, and cost...</text>
    <rect x="64" y="732" width="296" height="64" rx="12" fill="#0F172A"/><rect x="84" y="758" width="228" height="10" rx="5" fill="#263347"/><rect x="84" y="780" width="176" height="10" rx="5" fill="#263347"/>
  </g>
  <rect x="424" y="140" width="584" height="836" rx="16" class="card"/>
  <text x="456" y="184" class="h2">AI suggestions</text>
  <rect x="456" y="218" width="520" height="186" rx="14" fill="#101827" stroke="#365314"/>
  <text x="488" y="258" class="tiny">RECOMMENDED ANSWER</text><text x="488" y="292" class="body">Frame the answer around the problem constraints first, then map each cache strategy to latency, correctness, and operational cost.</text>
  <rect x="488" y="332" width="124" height="30" rx="15" fill="#14362B"/><text x="512" y="352" class="tiny">96% confident</text>
  <rect x="456" y="430" width="520" height="148" rx="14" fill="#0F172A" stroke="#334155"/><text x="488" y="470" class="tiny">FOLLOW UP SIGNAL</text><text x="488" y="504" class="body">They may ask about stale reads. Prepare an example with write-through versus cache-aside.</text>
  <rect x="456" y="604" width="520" height="148" rx="14" fill="#0F172A" stroke="#334155"/><text x="488" y="644" class="tiny">WHITEBOARD HINT</text><text x="488" y="678" class="body">Draw request path, cache hit path, miss path, and invalidation trigger.</text>
  <text x="456" y="816" class="h2">Processing</text>
  <rect x="456" y="848" width="520" height="20" rx="10" fill="#1E293B"/><rect x="456" y="848" width="388" height="20" rx="10" fill="#38BDF8"/>
  <text x="456" y="896" class="muted">OCR complete. AI analysis streaming suggestions.</text>
  <rect x="1040" y="140" width="368" height="500" rx="16" class="card"/>
  <text x="1072" y="184" class="h2">Floating assistant</text>
  <rect x="1088" y="226" width="286" height="210" rx="18" fill="#0B1020" stroke="#475569"/>
  <circle cx="1130" cy="272" r="20" fill="#7C3AED"/><text x="1164" y="266" class="body">Answer with a layered tradeoff model.</text><text x="1164" y="292" class="muted">Latency, correctness, cost, operations.</text>
  <line x1="1112" y1="330" x2="1350" y2="330" class="line"/>
  <text x="1112" y="368" class="tiny">Confidence</text><rect x="1198" y="356" width="126" height="12" rx="6" fill="#1E293B"/><rect x="1198" y="356" width="108" height="12" rx="6" fill="#22C55E"/>
  <rect x="1072" y="676" width="336" height="300" rx="16" class="card"/>
  <text x="1104" y="720" class="h2">Status indicators</text>
  <text x="1104" y="766" class="body">Capture verified</text><circle cx="1350" cy="760" r="8" fill="#22C55E"/>
  <text x="1104" y="812" class="body">Socket connected</text><circle cx="1350" cy="806" r="8" fill="#22C55E"/>
  <text x="1104" y="858" class="body">Invisible credits</text><text x="1282" y="858" class="body">245</text>
  <text x="1104" y="904" class="body">Current stage</text><text x="1242" y="904" class="body">System design</text>
